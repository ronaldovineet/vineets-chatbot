<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vineet's Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eef1f5;
}

.chat-container{
width:430px;
height:760px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.15);
display:flex;
flex-direction:column;
}

.header{
background:linear-gradient(135deg,#b56de1,#a564d9);
padding:18px;
color:white;
display:flex;
align-items:center;
gap:15px;
}

.bot-avatar{
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

.header h2{
font-size:28px;
}

.status{
font-size:14px;
opacity:.9;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:18px;
background:#fafafa;
}

.bot-row{
display:flex;
gap:10px;
margin-bottom:15px;
align-items:flex-end;
}

.user-row{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

.bot-icon{
width:36px;
height:36px;
border-radius:50%;
background:#e8def8;
display:flex;
justify-content:center;
align-items:center;
}

.bot-message{
background:#f0f0f0;
padding:14px 18px;
border-radius:22px;
max-width:75%;
line-height:1.5;
white-space:pre-wrap;
}

.user-message{
background:#b56de1;
color:white;
padding:14px 18px;
border-radius:22px;
max-width:75%;
line-height:1.5;
white-space:pre-wrap;
}

.quick-buttons{
display:flex;
gap:10px;
margin-left:46px;
margin-top:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.quick-buttons button{
background:white;
border:2px solid #c996eb;
color:#b56de1;
border-radius:25px;
padding:10px 18px;
cursor:pointer;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:14px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

.send-btn{
margin-left:10px;
background:#b56de1;
color:white;
border:none;
border-radius:25px;
padding:14px 20px;
cursor:pointer;
}

.clear-btn{
margin-left:10px;
background:#666;
color:white;
border:none;
border-radius:25px;
padding:14px 20px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="chat-container">

<div class="header">

<div class="bot-avatar">
🤖
</div>

<div>
<h2>Vineet's Chatbot</h2>
<div class="status">🟢 Online Now • AI Powered by Ollama</div>
</div>

</div>

<div id="chat" class="chat-box">

<div class="bot-row">
<div class="bot-icon">🤖</div>

<div class="bot-message">
Hello Vineet!

I'm your AI assistant powered by Ollama llama3.2.

Ask me anything.
</div>

</div>

<div class="quick-buttons">

<button onclick="quickAsk('Tell me about football')">
Football
</button>

<button onclick="quickAsk('Explain physics')">
Physics
</button>

<button onclick="quickAsk('What is AI?')">
AI
</button>

</div>

</div>

<div class="input-area">

<input
id="message"
placeholder="Reply to Vineet's Chatbot..."
>

<button
class="send-btn"
onclick="sendMessage()">
Send
</button>

<button
class="clear-btn"
onclick="clearChat()">
Clear
</button>

</div>

</div>

<script>

const chat=document.getElementById("chat");

let conversation=
JSON.parse(
localStorage.getItem("vineetMemory")
|| "[]"
);

function saveMemory(){
localStorage.setItem(
"vineetMemory",
JSON.stringify(conversation)
);
}

function addUserMessage(text){

chat.innerHTML+=`
<div class="user-row">
<div class="user-message">${text}</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;
}

function addBotMessage(text){

chat.innerHTML+=`
<div class="bot-row">
<div class="bot-icon">🤖</div>
<div class="bot-message">${text}</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;
}

function clearChat(){

localStorage.removeItem(
"vineetMemory"
);

location.reload();
}

function quickAsk(text){

document.getElementById(
"message"
).value=text;

sendMessage();
}

async function sendMessage(){

const input=
document.getElementById(
"message"
);

const text=input.value.trim();

if(!text) return;

addUserMessage(text);

conversation.push({
role:"user",
content:text
});

saveMemory();

input.value="";

addBotMessage("Thinking...");

const botMessages=
document.querySelectorAll(
".bot-message"
);

const thinkingMessage=
botMessages[
botMessages.length-1
];

try{

// const response=
// await fetch(
// "http://localhost:11434/api/chat",
// {
// method:"POST",
// headers:{
// "Content-Type":
// "application/json"
// },
// body:JSON.stringify({
// model:"llama3.2",
// messages:conversation,
// stream:false
// })
// }
// );

// const data=
// await response.json();

// const reply=
// data.message.content;

const API_KEY = "AQ.Ab8RN6LXvE4qIELsy0ZYrUK648hYBqOZkAGAm3oBuLo0Ew0dww";

const response = await fetch(
  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      contents: [
        {
          parts: [
            {
              text: text
            }
          ]
        }
      ]
    })
  }
);

const data = await response.json();

const reply =
  data.candidates[0].content.parts[0].text;

thinkingMessage.textContent=
reply;

conversation.push({
role:"assistant",
content:reply
});

saveMemory();

}
catch(error){

thinkingMessage.textContent=
"Could not connect to Ollama. Make sure Ollama is running.";

}

}

document
.getElementById("message")
.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
