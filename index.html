<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vineet's Chatbot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eef1f5;
}

.chat-container{
width:430px;
height:760px;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.15);
display:flex;
flex-direction:column;
}

.header{
background:linear-gradient(135deg,#b56de1,#a564d9);
padding:18px;
color:white;
display:flex;
align-items:center;
gap:15px;
}

.bot-avatar{
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

.header h2{
font-size:28px;
}

.status{
font-size:14px;
opacity:.9;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:18px;
background:#fafafa;
}

.bot-row{
display:flex;
gap:10px;
margin-bottom:15px;
align-items:flex-end;
}

.user-row{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

.bot-icon{
width:36px;
height:36px;
border-radius:50%;
background:#e8def8;
display:flex;
justify-content:center;
align-items:center;
}

.bot-message{
background:#f0f0f0;
padding:14px 18px;
border-radius:22px;
max-width:75%;
line-height:1.5;
white-space:pre-wrap;
}

.user-message{
background:#b56de1;
color:white;
padding:14px 18px;
border-radius:22px;
max-width:75%;
line-height:1.5;
white-space:pre-wrap;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:14px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

.send-btn{
margin-left:10px;
background:#b56de1;
color:white;
border:none;
border-radius:25px;
padding:14px 20px;
cursor:pointer;
}

.clear-btn{
margin-left:10px;
background:#666;
color:white;
border:none;
border-radius:25px;
padding:14px 20px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="chat-container">

<div class="header">
<div class="bot-avatar">🤖</div>
<div>
<h2>Vineet's Chatbot</h2>
<div class="status">🟢 Online Now • Gemini AI</div>
</div>
</div>

<div id="chat" class="chat-box">
<div class="bot-row">
<div class="bot-icon">🤖</div>
<div class="bot-message">
Hello Vineet!

I'm your AI assistant powered by Gemini.

Ask me anything.
</div>
</div>
</div>

<div class="input-area">
<input id="message" placeholder="Reply to Vineet's Chatbot...">

<button class="send-btn" onclick="sendMessage()">
Send
</button>

<button class="clear-btn" onclick="clearChat()">
Clear
</button>
</div>

</div>

<script>

const API_KEY = "AQ.Ab8RN6I5TNYY6PrUfw7u_OhispH_6QuVdbSJnq9ELqIc8IKsSQ";

const chat = document.getElementById("chat");

let conversation =
JSON.parse(
localStorage.getItem("vineetMemory")
|| "[]"
);

function saveMemory(){
localStorage.setItem(
"vineetMemory",
JSON.stringify(conversation)
);
}

function addUserMessage(text){

chat.innerHTML += `
<div class="user-row">
<div class="user-message">${escapeHtml(text)}</div>
</div>
`;

chat.scrollTop = chat.scrollHeight;
}

function addBotMessage(text){

chat.innerHTML += `
<div class="bot-row">
<div class="bot-icon">🤖</div>
<div class="bot-message">${escapeHtml(text)}</div>
</div>
`;

chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text){
const div = document.createElement("div");
div.textContent = text;
return div.innerHTML;
}

function clearChat(){
localStorage.removeItem("vineetMemory");
location.reload();
}

async function sendMessage(){

const input =
document.getElementById("message");

const text =
input.value.trim();

if(!text) return;

addUserMessage(text);

conversation.push({
role:"user",
content:text
});

saveMemory();

input.value = "";

addBotMessage("Thinking...");

const botMessages =
document.querySelectorAll(".bot-message");

const thinkingMessage =
botMessages[botMessages.length-1];

try{

const historyText =
conversation
.map(m => `${m.role}: ${m.content}`)
.join("\n");

const response =
await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text: historyText
}
]
}
]
})
}
);

const data = await response.json();

console.log(data);

let reply = "No response received.";

if (
  data.candidates &&
  data.candidates.length > 0 &&
  data.candidates[0].content &&
  data.candidates[0].content.parts &&
  data.candidates[0].content.parts.length > 0
) {
  reply = data.candidates[0].content.parts[0].text;
} else if (data.error) {
  reply = "Gemini Error: " + data.error.message;
}

thinkingMessage.textContent =
reply;

conversation.push({
role:"assistant",
content:reply
});

saveMemory();

}
catch(error){

thinkingMessage.textContent =
"Error connecting to Gemini API.";

console.error(error);

}

}

document
.getElementById("message")
.addEventListener(
"keydown",
function(e){
if(e.key==="Enter"){
sendMessage();
}
}
);

</script>

</body>
</html>
